<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sky Fighter</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #05070f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: #e8e8f0;
    overflow: hidden;
  }
  #hud {
    display: flex;
    gap: 36px;
    margin-bottom: 12px;
    font-size: 14px;
    font-weight: 600;
    color: #8888a0;
    letter-spacing: 0.5px;
  }
  #hud span { color: #e8e8f0; }
  canvas {
    display: block;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 0 80px rgba(56,189,248,0.12);
    cursor: none;
  }
  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(5,7,15,0.9);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    backdrop-filter: blur(6px);
  }
  #overlay h2 {
    font-size: 38px;
    font-weight: 900;
    letter-spacing: -1px;
    background: linear-gradient(135deg, #38bdf8 20%, #7dd3fc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  #overlay p { color: #8888a0; font-size: 13px; text-align: center; line-height: 1.8; }
  #hi-score { font-size: 13px; color: #fbbf24; min-height: 18px; }
  #overlay button {
    margin-top: 6px;
    padding: 12px 38px;
    background: linear-gradient(135deg, #0ea5e9, #38bdf8);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(56,189,248,0.4);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  #overlay button:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(56,189,248,0.55);
  }
  #overlay.hidden { display: none; }
</style>
</head>
<body>

<div id="hud">
  Score <span id="score">0</span>
  &nbsp;|&nbsp;
  Lives <span id="lives">✈ ✈ ✈</span>
  &nbsp;|&nbsp;
  Wave <span id="wave">1</span>
</div>
<canvas id="c"></canvas>

<div id="overlay">
  <h2 id="ov-title">Sky Fighter</h2>
  <p id="ov-sub">Move: ←→↑↓ / WASD / Mouse<br>Bullets fire automatically · Collect power-ups to survive</p>
  <p id="hi-score"></p>
  <button id="ov-btn">Start Game</button>
</div>

<script>
const canvas  = document.getElementById('c');
const ctx     = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const ovTitle = document.getElementById('ov-title');
const ovSub   = document.getElementById('ov-sub');
const ovBtn   = document.getElementById('ov-btn');
const scoreEl = document.getElementById('score');
const livesEl = document.getElementById('lives');
const waveEl  = document.getElementById('wave');
const hiEl    = document.getElementById('hi-score');

const CW = 480, CH = 640;
canvas.width = CW; canvas.height = CH;

// ── State ─────────────────────────────────────────────────────
let state = 'idle'; // idle | playing | dead
let score = 0, lives = 3, wave = 1, hiScore = 0, rafId;

// ── Stars ─────────────────────────────────────────────────────
const STARS = Array.from({ length: 130 }, () => ({
  x: Math.random() * CW,
  y: Math.random() * CH,
  r: Math.random() * 1.4 + 0.3,
  speed: Math.random() * 1.6 + 0.4,
  alpha: Math.random() * 0.5 + 0.2,
}));

// ── Player ────────────────────────────────────────────────────
const player = {
  x: CW / 2, y: CH - 90,
  w: 36, h: 44,
  spd: 5.5,
  bullets: [],
  fireTimer: 0, fireCooldown: 11,
  invincible: 0,
  shield: 0,
};

// ── Game objects ──────────────────────────────────────────────
let enemies = [], eBullets = [], particles = [], powerups = [];

// ── Input ─────────────────────────────────────────────────────
const keys = {};
let mouseX = CW / 2, mouseY = CH - 90, useMouse = false;

window.addEventListener('keydown', e => { keys[e.key] = true;  useMouse = false; });
window.addEventListener('keyup',   e => { keys[e.key] = false; });
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouseX = (e.clientX - r.left) * (CW / r.width);
  mouseY = (e.clientY - r.top)  * (CH / r.height);
  useMouse = true;
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const r = canvas.getBoundingClientRect();
  mouseX = (e.touches[0].clientX - r.left) * (CW / r.width);
  mouseY = (e.touches[0].clientY - r.top)  * (CH / r.height);
  useMouse = true;
}, { passive: false });

// ── Wave system ───────────────────────────────────────────────
let waveTimer = 0, waveSpawned = 0, waveCfg = null, bossAlive = false;

function waveCfgFor(w) {
  return {
    count:     Math.min(5 + w * 2, 30),
    speed:     1.2 + w * 0.14,
    hp:        1 + Math.floor(w / 3),
    canShoot:  w >= 3,
    shootRate: Math.max(50, 130 - w * 9),
    isBoss:    w % 5 === 0,
  };
}

function spawnWave() {
  waveCfg = waveCfgFor(wave);
  waveTimer = 0; waveSpawned = 0; bossAlive = false;
  if (waveCfg.isBoss) { spawnBoss(); bossAlive = true; }
}

function spawnBoss() {
  enemies.push({
    x: CW / 2, y: -90,
    type: 'boss',
    hp: 60 + wave * 25, maxHp: 60 + wave * 25,
    spd: 1.1, w: 76, h: 62,
    fireTimer: 0, fireCooldown: 32, canShoot: true,
    sineT: 0,
    points: 6000 + wave * 600,
  });
}

function spawnEnemy(type) {
  const cfg = waveCfg;
  const x = 36 + Math.random() * (CW - 72);
  let e = {
    x, y: -44,
    type,
    hp: cfg.hp, maxHp: cfg.hp,
    spd: cfg.speed + (Math.random() - 0.5) * 0.3,
    w: 28, h: 32,
    fireTimer: Math.floor(Math.random() * cfg.shootRate),
    fireCooldown: cfg.shootRate,
    canShoot: cfg.canShoot,
    sineT: Math.random() * Math.PI * 2,
    points: 100 * cfg.hp,
    color: '#f97316',
  };
  if (type === 'fast') {
    e.spd *= 1.9; e.hp = 1; e.maxHp = 1;
    e.color = '#f43f5e'; e.points = 80;
  } else if (type === 'heavy') {
    e.hp = cfg.hp * 3; e.maxHp = e.hp;
    e.w = 42; e.h = 48; e.spd *= 0.55;
    e.color = '#a855f7'; e.points = 350 * cfg.hp;
  }
  enemies.push(e);
}

function pickType() {
  const r = Math.random();
  if (wave <= 2) return 'basic';
  if (wave <= 4) return r < 0.65 ? 'basic' : 'fast';
  return r < 0.5 ? 'basic' : r < 0.78 ? 'fast' : 'heavy';
}

// ── Shoot ─────────────────────────────────────────────────────
function playerShoot() {
  const x = player.x, y = player.y - player.h / 2;
  player.bullets.push({ x, y, w: 4, h: 14, vy: -13, color: '#38bdf8' });
  if (wave >= 4) {
    player.bullets.push({ x: x - 15, y: y + 10, w: 3, h: 11, vy: -12, color: '#7dd3fc' });
    player.bullets.push({ x: x + 15, y: y + 10, w: 3, h: 11, vy: -12, color: '#7dd3fc' });
  }
  if (wave >= 8) {
    player.bullets.push({ x: x - 28, y: y + 18, w: 3, h: 10, vy: -11, color: '#bae6fd' });
    player.bullets.push({ x: x + 28, y: y + 18, w: 3, h: 10, vy: -11, color: '#bae6fd' });
  }
}

// ── Particles ─────────────────────────────────────────────────
function boom(x, y, color, n = 12) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 1.2 + Math.random() * 4;
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s,
      life: 1, decay: 0.022 + Math.random() * 0.02, r: 2 + Math.random()*3, color });
  }
}
function spark(x, y, color, n = 4) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 1 + Math.random() * 2.5;
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s,
      life: 0.8, decay: 0.06, r: 1.5, color });
  }
}

function tryDropPowerup(x, y) {
  if (Math.random() > 0.28) return;
  powerups.push({ x, y, vy: 1.4,
    type: Math.random() < 0.55 ? 'shield' : 'score' });
}

// ── Hit player ────────────────────────────────────────────────
function hitPlayer() {
  if (player.invincible > 0) return;
  if (player.shield > 0) {
    boom(player.x, player.y, '#06d6a0', 10);
    player.shield = 0; return;
  }
  boom(player.x, player.y, '#f97316', 16);
  lives--;
  updateHud();
  player.invincible = 130;
  if (lives <= 0) state = 'dead';
}

// ── Update ────────────────────────────────────────────────────
function updateStars() {
  for (const s of STARS) {
    s.y += s.speed;
    if (s.y > CH) { s.y = -2; s.x = Math.random() * CW; }
  }
}

function updatePlayer() {
  if (useMouse) {
    player.x += (mouseX - player.x) * 0.16;
    player.y += (mouseY - player.y) * 0.16;
  } else {
    if (keys['ArrowLeft']  || keys['a'] || keys['A']) player.x -= player.spd;
    if (keys['ArrowRight'] || keys['d'] || keys['D']) player.x += player.spd;
    if (keys['ArrowUp']    || keys['w'] || keys['W']) player.y -= player.spd;
    if (keys['ArrowDown']  || keys['s'] || keys['S']) player.y += player.spd;
  }
  player.x = Math.max(player.w/2, Math.min(CW - player.w/2, player.x));
  player.y = Math.max(player.h/2 + 28, Math.min(CH - player.h/2, player.y));

  player.fireTimer++;
  if (player.fireTimer >= player.fireCooldown) { playerShoot(); player.fireTimer = 0; }

  if (player.invincible > 0) player.invincible--;
  if (player.shield > 0)     player.shield--;
}

function updatePlayerBullets() {
  for (let i = player.bullets.length - 1; i >= 0; i--) {
    const b = player.bullets[i];
    b.y += b.vy;
    if (b.y < -20) { player.bullets.splice(i, 1); continue; }

    // Hit enemy
    let hit = false;
    for (let j = enemies.length - 1; j >= 0; j--) {
      const e = enemies[j];
      if (circRectsOverlap(b.x, b.y, e.x, e.y, Math.max(e.w, e.h) / 2 + 4)) {
        spark(b.x, b.y, '#38bdf8');
        player.bullets.splice(i, 1);
        e.hp--;
        if (e.hp <= 0) killEnemy(j, e);
        hit = true; break;
      }
    }
    if (hit) continue;
  }
}

function killEnemy(idx, e) {
  const isBoss = e.type === 'boss';
  boom(e.x, e.y, isBoss ? '#ef4444' : e.color, isBoss ? 32 : 14);
  tryDropPowerup(e.x, e.y);
  score += e.points;
  scoreEl.textContent = score;
  enemies.splice(idx, 1);
  if (isBoss) {
    bossAlive = false;
    wave++;
    waveEl.textContent = wave;
    setTimeout(spawnWave, 2000);
  }
}

function updateEnemies() {
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    e.sineT += 0.04;

    if (e.type === 'boss') {
      e.x = CW/2 + Math.sin(e.sineT * 0.45) * (CW/2 - e.w/2 - 16);
      if (e.y < 85) e.y += e.spd;
    } else {
      e.y += e.spd;
      e.x += Math.sin(e.sineT) * (e.type === 'fast' ? 2.8 : 1.6);
    }

    if (e.y > CH + 60) { enemies.splice(i, 1); continue; }

    // Enemy shoot
    if (e.canShoot) {
      e.fireTimer++;
      if (e.fireTimer >= e.fireCooldown) {
        e.fireTimer = 0;
        if (e.type === 'boss') {
          for (let k = -1; k <= 1; k++) {
            eBullets.push({ x: e.x + k * 22, y: e.y + e.h/2,
              vx: k * 1.6, vy: 4.2, r: 5, color: '#ef4444' });
          }
        } else {
          const dx = player.x - e.x, dy = player.y - e.y;
          const d = Math.hypot(dx, dy) || 1;
          const spd = 3.8;
          eBullets.push({ x: e.x, y: e.y + e.h/2,
            vx: dx/d * spd, vy: dy/d * spd, r: 4, color: '#fb923c' });
        }
      }
    }

    // Ram player
    if (player.invincible <= 0) {
      if (circRectsOverlap(player.x, player.y, e.x, e.y, Math.max(e.w,e.h)/2 + 14)) {
        hitPlayer();
        if (e.type !== 'boss') { boom(e.x, e.y, e.color, 10); enemies.splice(i, 1); }
      }
    }
  }
}

function updateEBullets() {
  for (let i = eBullets.length - 1; i >= 0; i--) {
    const b = eBullets[i];
    b.x += b.vx; b.y += b.vy;
    if (b.y > CH + 20 || b.x < -20 || b.x > CW + 20) { eBullets.splice(i, 1); continue; }
    if (player.invincible <= 0) {
      if (Math.hypot(b.x - player.x, b.y - player.y) < b.r + 13) {
        eBullets.splice(i, 1);
        hitPlayer();
      }
    }
  }
}

function updatePowerups() {
  for (let i = powerups.length - 1; i >= 0; i--) {
    const p = powerups[i];
    p.y += p.vy;
    if (p.y > CH + 20) { powerups.splice(i, 1); continue; }
    if (Math.hypot(p.x - player.x, p.y - player.y) < 22) {
      if (p.type === 'shield') player.shield = 320;
      else { score += 500; scoreEl.textContent = score; }
      boom(p.x, p.y, p.type === 'shield' ? '#06d6a0' : '#fbbf24', 10);
      powerups.splice(i, 1);
    }
  }
}

function updateParticles() {
  particles = particles.filter(p => p.life > 0);
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life -= p.decay;
  }
}

function updateWaveSpawner() {
  if (bossAlive || !waveCfg) return;
  waveTimer++;
  if (waveSpawned < waveCfg.count && waveTimer % 20 === 0) {
    spawnEnemy(pickType());
    waveSpawned++;
  }
  if (waveSpawned >= waveCfg.count && enemies.length === 0) {
    wave++; waveEl.textContent = wave;
    waveCfg = null;
    setTimeout(spawnWave, 1400);
  }
}

function circRectsOverlap(ax, ay, bx, by, threshold) {
  return Math.hypot(ax - bx, ay - by) < threshold;
}

function updateHud() {
  livesEl.textContent = lives > 0 ? '✈ '.repeat(lives).trim() : '—';
}

// ── Draw ──────────────────────────────────────────────────────
function drawBackground() {
  ctx.fillStyle = '#05070f';
  ctx.fillRect(0, 0, CW, CH);
}

function drawStars() {
  for (const s of STARS) {
    ctx.save();
    ctx.globalAlpha = s.alpha;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function drawPlayer() {
  const { x, y, w, h, invincible, shield } = player;
  if (invincible > 0 && Math.floor(invincible / 4) % 2 === 0) return;

  ctx.save();
  ctx.translate(x, y);

  // Engine exhaust flame (flickers)
  const flameH = 14 + Math.random() * 10;
  const flameGrad = ctx.createLinearGradient(0, h/2, 0, h/2 + flameH);
  flameGrad.addColorStop(0, '#f97316');
  flameGrad.addColorStop(1, 'rgba(249,115,22,0)');
  ctx.fillStyle = flameGrad;
  ctx.beginPath();
  ctx.ellipse(0, h/2, 7, flameH/2, 0, 0, Math.PI * 2);
  ctx.fill();

  // Body glow
  ctx.shadowColor = '#38bdf8';
  ctx.shadowBlur = 18;

  // Main body
  const bodyG = ctx.createLinearGradient(0, -h/2, 0, h/2);
  bodyG.addColorStop(0, '#7dd3fc');
  bodyG.addColorStop(0.45, '#38bdf8');
  bodyG.addColorStop(1, '#0369a1');
  ctx.fillStyle = bodyG;
  ctx.beginPath();
  ctx.moveTo(0, -h/2);
  ctx.lineTo(w/2, h/4);
  ctx.lineTo(w/3, h/2);
  ctx.lineTo(-w/3, h/2);
  ctx.lineTo(-w/2, h/4);
  ctx.closePath();
  ctx.fill();

  // Wings
  ctx.shadowBlur = 6;
  ctx.fillStyle = '#0ea5e9';
  ctx.beginPath();
  ctx.moveTo(-w/2, h/4);
  ctx.lineTo(-w * 0.9, h/2 + 5);
  ctx.lineTo(-w/5, h/8);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(w/2, h/4);
  ctx.lineTo(w * 0.9, h/2 + 5);
  ctx.lineTo(w/5, h/8);
  ctx.closePath();
  ctx.fill();

  // Cockpit
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,255,255,0.65)';
  ctx.beginPath();
  ctx.ellipse(0, -h/9, w/8, h/5.5, 0, 0, Math.PI * 2);
  ctx.fill();

  // Shield ring
  if (shield > 0) {
    const pulse = 0.4 + 0.25 * Math.sin(Date.now() / 180);
    ctx.shadowColor = '#06d6a0';
    ctx.shadowBlur = 18;
    ctx.strokeStyle = `rgba(6,214,160,${pulse})`;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.arc(0, 0, w * 0.78, 0, Math.PI * 2);
    ctx.stroke();
  }

  ctx.restore();
}

function drawEnemy(e) {
  ctx.save();
  ctx.translate(e.x, e.y);

  if (e.type === 'boss') {
    ctx.shadowColor = '#ef4444';
    ctx.shadowBlur = 16;
    const g = ctx.createLinearGradient(0, -e.h/2, 0, e.h/2);
    g.addColorStop(0, '#ef4444');
    g.addColorStop(1, '#7f1d1d');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.moveTo(0, e.h/2);
    ctx.lineTo(e.w/2, -e.h/6);
    ctx.lineTo(e.w * 0.75, -e.h/2);
    ctx.lineTo(0, -e.h/3.5);
    ctx.lineTo(-e.w * 0.75, -e.h/2);
    ctx.lineTo(-e.w/2, -e.h/6);
    ctx.closePath();
    ctx.fill();

    // HP bar
    const barW = 90;
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#1e1e2e';
    ctx.beginPath(); ctx.roundRect(-barW/2, -e.h/2 - 14, barW, 6, 3); ctx.fill();
    ctx.fillStyle = '#ef4444';
    ctx.beginPath(); ctx.roundRect(-barW/2, -e.h/2 - 14, barW * (e.hp / e.maxHp), 6, 3); ctx.fill();
    ctx.fillStyle = 'rgba(239,68,68,0.7)';
    ctx.font = 'bold 9px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('⚠ BOSS', 0, -e.h/2 - 20);
  } else {
    ctx.rotate(Math.PI);
    ctx.shadowColor = e.color;
    ctx.shadowBlur = 10;
    const g = ctx.createLinearGradient(0, -e.h/2, 0, e.h/2);
    g.addColorStop(0, e.color);
    g.addColorStop(1, e.type === 'heavy' ? '#6b21a8' : '#9a1010');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.moveTo(0, -e.h/2);
    ctx.lineTo(e.w/2, e.h/3);
    ctx.lineTo(e.w/3, e.h/2);
    ctx.lineTo(-e.w/3, e.h/2);
    ctx.lineTo(-e.w/2, e.h/3);
    ctx.closePath();
    ctx.fill();
    // Wings
    ctx.fillStyle = e.type === 'heavy' ? '#7c3aed' : '#b91c1c';
    ctx.beginPath();
    ctx.moveTo(-e.w/2, e.h/3);
    ctx.lineTo(-e.w * 0.88, e.h/2 + 4);
    ctx.lineTo(-e.w/4, e.h/7);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(e.w/2, e.h/3);
    ctx.lineTo(e.w * 0.88, e.h/2 + 4);
    ctx.lineTo(e.w/4, e.h/7);
    ctx.closePath(); ctx.fill();
  }

  ctx.restore();
}

function drawBullet(b) {
  ctx.save();
  ctx.shadowColor = b.color; ctx.shadowBlur = 10;
  ctx.fillStyle = b.color;
  ctx.beginPath();
  ctx.roundRect(b.x - b.w/2, b.y - b.h/2, b.w, b.h, b.w/2);
  ctx.fill();
  ctx.restore();
}

function drawEBullet(b) {
  ctx.save();
  ctx.shadowColor = b.color; ctx.shadowBlur = 12;
  ctx.fillStyle = b.color;
  ctx.beginPath();
  ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawPowerup(p) {
  const color = p.type === 'shield' ? '#06d6a0' : '#fbbf24';
  const t = Date.now() / 400;
  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.rotate(t);
  ctx.shadowColor = color; ctx.shadowBlur = 14;
  ctx.strokeStyle = color; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(0, 0, 10, 0, Math.PI * 2); ctx.stroke();
  ctx.fillStyle = color;
  ctx.font = 'bold 11px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.shadowBlur = 0;
  ctx.fillText(p.type === 'shield' ? 'S' : '+', 0, 0);
  ctx.restore();
}

function drawParticles() {
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.shadowColor = p.color; ctx.shadowBlur = 6;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// ── Main loop ─────────────────────────────────────────────────
function render() {
  drawBackground();
  drawStars();
  for (const p of powerups)       drawPowerup(p);
  for (const b of player.bullets) drawBullet(b);
  for (const b of eBullets)       drawEBullet(b);
  for (const e of enemies)        drawEnemy(e);
  drawParticles();
  if (state === 'playing')        drawPlayer();
}

function update() {
  updateStars();
  updatePlayer();
  updatePlayerBullets();
  updateEnemies();
  updateEBullets();
  updatePowerups();
  updateParticles();
  updateWaveSpawner();
}

function loop() {
  update();
  render();
  if (state === 'dead') {
    if (score > hiScore) hiScore = score;
    ovTitle.textContent = 'Game Over';
    ovSub.textContent   = `Score: ${score.toLocaleString()}`;
    hiEl.textContent    = hiScore > 0 ? `Best: ${hiScore.toLocaleString()}` : '';
    ovBtn.textContent   = 'Play Again';
    overlay.classList.remove('hidden');
    return;
  }
  rafId = requestAnimationFrame(loop);
}

function startGame() {
  score = 0; lives = 3; wave = 1;
  player.x = CW/2; player.y = CH - 90;
  player.bullets = []; player.fireTimer = 0;
  player.invincible = 0; player.shield = 0;
  enemies = []; eBullets = []; particles = []; powerups = [];
  scoreEl.textContent = '0';
  waveEl.textContent  = '1';
  updateHud();
  spawnWave();
  overlay.classList.add('hidden');
  state = 'playing';
  if (rafId) cancelAnimationFrame(rafId);
  loop();
}

ovBtn.addEventListener('click', startGame);

// Initial frame
drawBackground();
drawStars();
</script>
</body>
</html>
