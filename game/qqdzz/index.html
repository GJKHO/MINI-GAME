<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ball Battle - Offline Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 游戏画布 -->
    <canvas id="gameCanvas"></canvas>

    <!-- 开始菜单 -->
    <div id="startMenu">
        <div class="menu-box">
            <h1>Ball Battle</h1>
            <input type="text" id="nicknameInput" placeholder="Enter your nickname" maxlength="10" value="Player">
            <button id="startBtn">Start Game</button>
            <div class="controls-hint">
                <p>Mouse / Touch: Move</p>
                <p>Space / Split button: Split</p>
                <p>W / Eject button: Eject Mass</p>
            </div>
        </div>
    </div>

    <!-- 游戏UI层 (游戏开始后显示) -->
    <div id="gameUI" style="display: none;">
        <div id="leaderboard">
            <h3>Leaderboard</h3>
            <ul id="leaderboardList">
                <!-- JS动态生成 -->
            </ul>
        </div>
        <div id="scoreBox">
            Mass: <span id="scoreVal">0</span>
        </div>
        <div id="mobileControls">
            <button id="btnSplit" type="button">SPLIT</button>
            <button id="btnEject" type="button">EJECT</button>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
